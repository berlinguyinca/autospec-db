name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpw
          POSTGRES_DB: autospec
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d autospec"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      AUTOSPEC_DB_TEST_DSN: postgresql://postgres:testpw@localhost:5432/autospec?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race ./...
